<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Steps | 레벨 퍼즐 게임</title>
    <meta name="description" content="단계별로 퍼즐을 풀며 다음 레벨을 여는 브라우저 퍼즐 게임입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=SUIT:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-shell">
        <section class="hero-panel">
            <p class="eyebrow">Puzzle Steps</p>
            <h1>레벨을 하나씩 열어가며 퍼즐을 푸는 게임</h1>
            <p class="hero-copy">정답을 맞히면 다음 스테이지가 열립니다. 막히면 힌트를 보고, 끝까지 클리어하면 처음부터 다시 도전할 수 있습니다.</p>

            <div class="hero-stats">
                <article class="stat-card">
                    <span class="stat-label">진행률</span>
                    <strong id="progress-text">0 / 5 완료</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">현재 레벨</span>
                    <strong id="current-level-text">Level 1</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">상태</span>
                    <strong id="status-chip">도전 시작</strong>
                </article>
            </div>

            <div class="progress-track" aria-hidden="true">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </section>

        <section class="board-layout">
            <aside class="level-panel">
                <div class="panel-head">
                    <h2>레벨 선택</h2>
                    <button id="reset-button" class="ghost-button" type="button">처음부터</button>
                </div>
                <div id="level-list" class="level-list" aria-label="퍼즐 레벨 목록"></div>
            </aside>

            <section class="puzzle-panel">
                <div class="panel-head">
                    <div>
                        <p id="puzzle-tag" class="panel-tag">LEVEL 1</p>
                        <h2 id="puzzle-title">숫자 패턴</h2>
                    </div>
                    <span id="difficulty-badge" class="difficulty-badge">쉬움</span>
                </div>

                <div class="puzzle-card">
                    <p class="card-label">문제</p>
                    <p id="puzzle-question" class="puzzle-question"></p>
                </div>

                <div class="puzzle-grid">
                    <div class="puzzle-card accent-card">
                        <p class="card-label">힌트</p>
                        <p id="puzzle-hint" class="puzzle-hint"></p>
                    </div>
                    <div class="puzzle-card">
                        <p class="card-label">입력</p>
                        <label class="answer-box" for="answer-input">
                            <input id="answer-input" type="text" autocomplete="off" placeholder="정답 입력">
                        </label>
                        <div class="button-row">
                            <button id="submit-button" class="primary-button" type="button">정답 확인</button>
                            <button id="hint-button" class="ghost-button" type="button">힌트 보기</button>
                        </div>
                    </div>
                </div>

                <div id="feedback-box" class="feedback-box" aria-live="polite">
                    첫 번째 퍼즐부터 시작해 보세요.
                </div>
            </section>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
