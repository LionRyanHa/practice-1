<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is it? | Image ID</title>
    <meta name="google-adsense-account" content="ca-pub-5934378896394524">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5934378896394524"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>Face Identifier</h1>
                <button id="theme-toggle" class="btn-icon">🌓</button>
            </div>
            <p>Identifying: 원동균 vs 이규진</p>
        </header>
        
        <div class="main-display">
            <div class="model-info">Teachable Machine Image Model (File Upload)</div>
            <div class="upload-container" id="upload-container">
                <input type="file" id="image-input" accept="image/*" hidden>
                <label for="image-input" class="upload-label">
                    <div id="image-preview-container">
                        <img id="image-preview" src="" alt="Preview" style="display: none;">
                        <div id="upload-placeholder">
                            <span class="upload-icon">📷</span>
                            <p>Click to upload an image</p>
                        </div>
                    </div>
                </label>
            </div>
        </div>

        <div class="prediction-container">
            <div id="label-container"></div>
        </div>

        <div class="controls">
            <button id="predict-btn" class="btn-primary" style="display: none;">Identify Person</button>
        </div>

        <div class="contact-section">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mqeyagpv" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-primary w-100">Send Inquiry</button>
            </form>
        </div>

        <div id="comments-section" class="comments-section">
            <h3>Comments</h3>
            <div id="disqus_thread"></div>
            <script>
                (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://practice-co8vg837fa.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </div>

    <!-- AI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
